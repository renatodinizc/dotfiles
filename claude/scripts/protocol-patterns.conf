# Protocol Pattern Table — all tuning happens here
# Sourced by protocol-router.sh
#
# Format: TAB-separated fields
#   PATTERN_NAME	REGEX	PROTOCOL:WEIGHT[,PROTOCOL:WEIGHT]
#
# Special markers:
#   :HARD   — bypasses threshold (activates protocol regardless of score)
#   :GATE   — hard-suppresses the protocol (score is ignored)
#
# Regexes use grep -iE (ERE, case-insensitive). No shell quoting issues.
# Lines starting with # are comments. Blank lines are ignored.

# ============================================================================
# EMOTIONAL signals
# ============================================================================
profanity	(^|[^a-z])(fuck|shit|damn|hell|crap|wtf|ffs|goddamn)([^a-z]|$)	EMOTIONAL:5:HARD
frustration_self	i'm (so |really |extremely )?(frustrated|fed up|sick of|losing my mind|over it|done with)	EMOTIONAL:3
stress_self	i'm (so |really )?(stressed|overwhelmed|drowning|burning out|exhausted|anxious)	EMOTIONAL:3
catastrophize	(everything is (broken|ruined|falling apart)|nothing (works|is working)|i always |i never )	EMOTIONAL:2
persistent_feeling	(should be happy but|something feels off|persistent dread|can't shake|keeps nagging)	EMOTIONAL:3
helplessness	(i (can't|cannot) (cope|handle|take|bear|stand) (this|it|anymore)|i don't know what to do|i give up)	EMOTIONAL:3

# ============================================================================
# TIER3 — irreversible decision signals
# ============================================================================
commitment_lang	(i've decided to|i accepted the|i'm (going to )?(quit|leav|resign|end|break off|drop out))	TIER3:2
deadline_pressure	(need to decide by|(the |my )deadline|by (tomorrow|end of|tonight)|running out of time|last chance)	TIER3:3
high_stakes	(quit.{0,10}(my |the )?job|job offer|salary|compensation|mortgage|moving to|relocat|marriage|divorce|custody|pregnant|buying a (house|home))	TIER3:3
bias_convergence	(i know i should.{0,30}(but|however)|everyone says.{0,30}(but|however)|sunk cost|already invested)	TIER3:2
values_conflict	(goes against|contradicts what i|betraying my|compromising my (values|principles|integrity))	TIER3:2
point_of_no_return	(no turning back|no going back|point of no return|can't undo|irreversible|one-way door)	TIER3:2

# ============================================================================
# CLARIFICATION signals
# ============================================================================
vague_terms	(^|[ ,;:!?.])(fast|clean|better|simple|good|scalable|healthy|productive|efficient|proper|elegant|nice|robust|modern)([ ,;:!?.]|$)	CLAR:2
conflicting_goals	(want .{3,40} but |need .{3,40} but |ideally .{3,40} but realistically|on one hand .{3,40} on the other|torn between)	CLAR:3
scope_ambiguous	(^|[ ,;:!?.])(make it (work|better|right|good)|fix (this|it|everything)|improve (this|it|the)|clean (this|it) up)([ ,;:!?.]|$)	CLAR:2
# multiple_interp disabled — too broad for technical contexts, added noise to CLAR scoring

# ============================================================================
# SUPPRESSORS — reduce scores for non-matching contexts
# ============================================================================
code_context	([{}]|fn |def |class |import |require |use |mod |pub |impl |async fn|let |const |var |=>|->|hashmap|vec<|string::|println|console\.)	TIER3:-3,CLAR:-1,EMOTIONAL:-2
code_fence	```	TIER3:-4,CLAR:-2,EMOTIONAL:-3
tool_names	(git |docker |cargo |npm |pip |kubectl |brew |curl |grep |awk |sed )	TIER3:-2,EMOTIONAL:-2
file_extensions	\.(rs|py|ts|tsx|js|jsx|go|rb|java|kt|cpp|c|h|sh|sql|yaml|yml|json|toml)([^a-z]|$)	TIER3:-2,EMOTIONAL:-1
clear_scoped	(^|[ ,;:!?.])(rename |delete |remove |move |add a test|fix the (error|bug|typo|crash|warning)|run (the )?tests|update the (version|dep))	CLAR:-3
just_do_it	(just do it|don't ask|skip clarification|no questions|jfdi|i know what i want|go ahead and)	CLAR:GATE
already_decided	(already thought.{0,20}(through|about)|don't need.{0,20}analysis|already considered|just execute|ship it)	TIER3:-2
execution_request	(^|[ ,;:!?.])(write the code|implement it|build it|create the|generate the|code it up)([ ,;:!?.]|$)	TIER3:-2,CLAR:-2
